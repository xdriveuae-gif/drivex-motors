{{> partials/admin-head }}

<section class="admin-panel">
  <div class="panel-head vehicles-head">
    <h2>Vehicle Purchase Leads</h2>
    <span class="muted" id="leadsCount"></span>
  </div>

  <div class="vehicles-toolbar">
    <div class="search-box admin-search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4a6 6 0 104.5 10.1l4.7 4.7 1.4-1.4-4.7-4.7A6 6 0 0010 4zm0 2a4 4 0 110 8 4 4 0 010-8z"/></svg>
      <input type="search" id="adminSearch" placeholder="Search name, make, model, phone, email, ref…" autocomplete="off" />
    </div>
    <select id="statusFilter" class="status-filter">
      <option value="">All statuses</option>
      <option>New</option>
      <option>Under Review</option>
      <option>Contacted</option>
      <option>Offer Sent</option>
      <option>Purchased</option>
      <option>Rejected</option>
    </select>
  </div>

  <div class="table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Ref</th>
          <th>Vehicle</th>
          <th>Customer</th>
          <th>Asking</th>
          <th>Status</th>
          <th>Submitted</th>
          <th class="ta-right">Actions</th>
        </tr>
      </thead>
      <tbody id="leadsTbody">
        <tr><td colspan="7" class="muted ta-center">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <nav class="pagination" id="adminPagination" aria-label="Lead pages"></nav>
</section>

<script src="/js/admin-leads.js" defer></script>
{{> partials/admin-footer }}
